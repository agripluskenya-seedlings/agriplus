<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agriplus Kenya | Professional Nursery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; line-height: 1.6; }

        /* Hero Section */
        .hero-banner { text-align: center; padding: 60px 20px; background: #e0f2f1; }

        /* The Grid Layout - THIS WAS MISSING */
        .seedling-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            padding: 40px 10%; 
            justify-items: center;
        }

        /* Pricing & Badges */
        .price-badge { background: #1da884; color: white; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; display: inline-block; margin-bottom: 10px; }

        /* Card Design */
        .seedling-card { background: #fff; border-radius: 12px; width: 300px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .seedling-card:hover { transform: translateY(-10px); }
        .seedling-img-holder { height: 200px; background-size: cover; background-position: center; background-color: #ddd; }
        .seedling-info { padding: 20px; }

        /* Footer & Socials */
        .site-footer { background: #0f2d24; color: #fff; padding: 40px 8%; text-align: center; }
        .social-links a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: bold; }
        .footer-bottom { margin-top: 20px; border-top: 1px solid #2d4a41; padding-top: 20px; font-size: 12px; }

        /* WhatsApp Button */
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <section class="hero-banner">
        <h1>Agriplus Kenya Seedlings</h1>
        <p>Certified, High-Yield Varieties. Quality you can trust.</p>
    </section>

    <section id="seedlings">
        <div class="seedling-grid">
            <div class="seedling-card">
                <div class="seedling-img-holder" style="background-image: url('pixie.jpg');"></div>
                <div class="seedling-info">
                    <span class="price-badge">KSh 200</span>
                    <h3>Grafted Pixie Orange</h3>
                </div>
            </div>
            <div class="seedling-card">
                <div class="seedling-img-holder" style="background-image: url('avocado.jpg');"></div>
                <div class="seedling-info">
                    <span class="price-badge">KSh 150</span>
                    <h3>Grafted Hass Avocado</h3>
                </div>
            </div>
            </div>
    </section>

    <footer class="site-footer">
        <h3>Contact Us</h3>
        <p>Kajiado, Kenya | 0745948200</p>
        <div class="social-links">
            <a href="https://www.facebook.com/profile.php?id=61586732219637">Facebook</a> | <a href="https://www.instagram.com/agriplus_kenya/">Instagram</a> | <a href="https://wa.me/254745948200">WhatsApp</a>
        </div>
    </footer>

    <a href="https://wa.me/254745948200" class="whatsapp-float">WhatsApp Us</a>

</body>
</html>
